name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - 'demo/**'
  repository_dispatch:
    types: [content-update]

env:
  GA_TAG_ID: ${{vars.GA_TAG_ID}}
  SITE: ${{secrets.SITE}}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cache dependencies
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            node_modules
            **/node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn --frozen-lockfile --prefer-offline

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn prettier --check 'src/**/*.{js,ts,mjs,cjs,json,astro}'

      - name: Test
        run: yarn test

      - name: Build
        env:
          GA_TAG_ID: ${{vars.GA_TAG_ID}}
        run: yarn build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=coder-rocks
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Tweet new posts
        if: >-
          github.event_name == 'repository_dispatch' &&
          github.event.client_payload.new_posts != ''
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/tweet-new-post.mjs "${{ github.event.client_payload.new_posts }}"
